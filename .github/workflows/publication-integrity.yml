name: Publication integrity

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publication-integrity.yml"
      - "sources.lock.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tooling/content/**"
      - "tooling/build/**"
      - "packages/docs/**"
      - "apps/sevara/**"
      - "apps/worldbook/**"
  pull_request:
    paths:
      - ".github/workflows/publication-integrity.yml"
      - "sources.lock.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tooling/content/**"
      - "tooling/build/**"
      - "packages/docs/**"
      - "apps/sevara/**"
      - "apps/worldbook/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify pinned publication
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out website repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.24.0

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: 0.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve and verify pinned authorities
        run: |
          pnpm content:sync
          pnpm content:verify:pinned

      - name: Rebuild publication artifacts
        run: |
          pnpm web-content:generate
          pnpm worldbook-publication:generate
          pnpm worldbook-publication:verify:pinned
          pnpm pdf:build
          pnpm build:apps
          pnpm manifests:build
          pnpm manifests:validate

      - name: Reject generated artifact drift
        run: >-
          git diff --exit-code --
          apps/sevara/src/generated
          apps/sevara/public
          apps/worldbook/src/generated
          apps/worldbook/public

      - name: Run repository tests
        run: pnpm test
