name: Publication integrity

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publication-integrity.yml"
      - "sources.lock.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tooling/content/**"
      - "tooling/build/**"
      - "packages/docs/**"
      - "apps/sevara/**"
      - "apps/worldbook/**"
  pull_request:
    paths:
      - ".github/workflows/publication-integrity.yml"
      - "sources.lock.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tooling/content/**"
      - "tooling/build/**"
      - "packages/docs/**"
      - "apps/sevara/**"
      - "apps/worldbook/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify pinned publication
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
    steps:
      - name: Check out website repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.24.0

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: 0.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure private source access
        if: ${{ env.SOURCE_REPO_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.SOURCE_REPO_TOKEN }}
        run: gh auth setup-git

      - name: Report unavailable provenance rebuild
        if: ${{ env.SOURCE_REPO_TOKEN == '' }}
        run: |
          echo "### Private-source provenance rebuild skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "Add a read-only SOURCE_REPO_TOKEN with access to the pinned Sevara and TheWorldBook repositories to enable clean source regeneration and drift rejection." >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve and verify pinned authorities
        if: ${{ env.SOURCE_REPO_TOKEN != '' }}
        run: |
          pnpm content:sync
          pnpm content:verify:pinned

      - name: Rebuild publication artifacts
        if: ${{ env.SOURCE_REPO_TOKEN != '' }}
        run: |
          pnpm web-content:generate
          pnpm worldbook-publication:generate
          pnpm worldbook-publication:verify:pinned
          pnpm pdf:build
          pnpm build:apps
          pnpm manifests:build
          pnpm manifests:validate

      - name: Reject generated artifact drift
        if: ${{ env.SOURCE_REPO_TOKEN != '' }}
        run: >-
          git diff --exit-code --
          apps/sevara/src/generated
          apps/sevara/public
          apps/worldbook/src/generated
          apps/worldbook/public

      - name: Verify committed publication artifacts
        run: pnpm build

      - name: Run repository tests
        run: pnpm test
